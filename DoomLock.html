<style>


*{
    margin:0;
    padding:0;

html{

body{

    background:#fff;

    color:#000;

/* NAV */


nav{

    position:fixed;

    top:0;

    left:0;

    right:0;

    height:80px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 5%;

    background:rgba(0,0,0,.75);

    backdrop-filter:blur(20px);

    border-bottom:1px solid #222;

    z-index:1000;

}



.logo{

    font-size:22px;

    font-weight:900;

    letter-spacing:6px;

}



.nav-link{

    color:#888;

    text-decoration:none;

    font-size:14px;

}







/* HERO */


.hero{

    min-height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    padding:130px 20px 50px;

}



.hero small{

    color:#777;

    letter-spacing:8px;

}



.hero h1{

    margin-top:30px;

    font-size:clamp(45px,8vw,95px);

    line-height:.95;

    letter-spacing:-5px;

    font-weight:900;

}



.hero p{

    max-width:650px;

    margin-top:30px;

    color:#999;

    font-size:22px;

    line-height:1.6;

}








/* PATENT PRODUCT VIEW */


.patent-view{

    position:relative;

    width:520px;

    height:600px;

    margin:80px auto;

    animation:floatPatent 6s ease-in-out infinite;

}



@keyframes floatPatent{


    0%,100%{

        transform:translateY(0);

    }


    50%{

        transform:translateY(-12px);

    }


}







/* PHONE */


.patent-phone{


    position:absolute;

    left:150px;

    top:40px;

    width:230px;

    height:450px;

    background:#fff;

    border:5px solid #111;

    border-radius:40px;

    box-shadow:

    0 40px 100px rgba(255,255,255,.12);


}



.patent-screen{


    position:absolute;

    inset:18px;

    background:#000;

    border-radius:28px;

    overflow:hidden;


}



.screen-line{


    height:45px;

    background:#222;

    margin:25px 18px;

    border-radius:8px;


}



.thumb-indicator{


    position:absolute;

    bottom:50px;

    right:20px;

    color:#fff;

    font-size:10px;

    border:1px solid #555;

    padding:8px;

}







/* USB C PORT */


.usb-port{


    position:absolute;

    bottom:-10px;

    left:50%;

    transform:translateX(-50%);

    width:50px;

    height:12px;

    background:#111;

    border-radius:8px;


}







/* ADAPTER */


.usb-adapter{


    position:absolute;

    top:480px;

    left:238px;

    width:55px;

    height:70px;

    background:#fff;

    border:4px solid #111;

    border-radius:10px;


}


.adapter-label{

    position:absolute;

    right:-45px;

    top:20px;

    font-size:12px;

}








/* SILICONE LOOP */


.silicone-loop{


    position:absolute;

    top:500px;

    left:285px;

    width:170px;

    height:120px;

    border:8px solid #fff;

    border-radius:100px;

    transform:rotate(25deg);


}



.loop-label{


    position:absolute;

    right:-45px;

    top:45px;

    font-size:12px;

}







/* HAND */


.hand{


    position:absolute;

    right:25px;

    bottom:40px;

    width:150px;

    height:230px;

    background:#222;

    border-radius:80px 80px 30px 30px;


}



.thumb{


    position:absolute;

    left:-45px;

    top:35px;

    width:75px;

    height:150px;

    background:#333;

    border-radius:50px;


}




.thumb-loop{


    position:absolute;

    top:45px;

    left:-15px;

    width:95px;

    height:95px;

    border:6px solid #fff;

    border-radius:50%;


}



.thumb-loop span{

    position:absolute;

    right:-35px;

    top:35px;

    font-size:12px;

}






/* CALLOUTS */


.callout{


    position:absolute;

    color:#999;

    font-size:13px;

    line-height:1.5;

}



.phone-callout{

    left:20px;

    top:160px;

}



.usb-callout{

    left:30px;

    bottom:100px;

}



.band-callout{

    right:0;

    top:500px;

}



.thumb-callout{

    right:0;

    bottom:100px;

}






/* BUTTON */


.btn{


    margin-top:20px;

    padding:18px 45px;

    border:none;

    border-radius:50px;

    background:#fff;

    color:#000;

    font-size:16px;

    font-weight:700;

    cursor:pointer;


}


.btn:hover{


    transform:translateY(-5px);


}
